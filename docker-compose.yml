services:
  fileserver:
    build: .
    ports:
      - "3000:3000"
    environment:
      - FILE_SERVER_PASSWORD=${FILE_SERVER_PASSWORD}
      - FILE_ROOT=/data
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
    volumes:
      - /share/Public:/data:ro
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - fileserver
